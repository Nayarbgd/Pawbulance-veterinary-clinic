kind = "web"
previewPath = "/"
title = "Pawbulance Veterinary Clinic"
version = "1.0.0"
id = "artifacts/pawbulance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25176

[services.development]
run = "pnpm --filter @workspace/pawbulance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pawbulance", "run", "build" ]
publicDir = "artifacts/pawbulance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25176"
BASE_PATH = "/"
